name: Build & Push NextJS Landing to AWS ECR (PROD)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build Docker image (--progress=plain shows full logs so failures are visible)
      - name: Build Docker image
        run: |
          docker build \
            --progress=plain \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_DASHBOARD_URL=${{ secrets.NEXT_PUBLIC_DASHBOARD_URL }} \
            --build-arg NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }} \
            --build-arg NEXT_PUBLIC_USE_API_PROXY=true \
            -t pixel-super-admin:latest .

      - name: Tag and push Docker image
        id: push
        env:
          ECR_URI: 672627895299.dkr.ecr.eu-north-1.amazonaws.com/pixel-super-admin
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag pixel-super-admin:latest $ECR_URI:latest
          docker tag pixel-super-admin:latest $ECR_URI:$IMAGE_TAG
          docker push $ECR_URI:latest
          docker push $ECR_URI:$IMAGE_TAG
          echo "image=$ECR_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Update ECS task definition to use the new image (by SHA tag) so new code always runs
      - name: Update ECS task definition and deploy
        env:
          CLUSTER: pixeldesk-cluster
          SERVICE: super-admin-task-service-rowat223
          REGION: eu-north-1
          NEW_IMAGE: ${{ steps.push.outputs.image }}
        run: |
          TASK_DEF_ARN=$(aws ecs describe-services --cluster $CLUSTER --services $SERVICE --region $REGION --query 'services[0].taskDefinition' --output text)
          TASK_FAMILY=$(aws ecs describe-task-definition --task-definition $TASK_DEF_ARN --region $REGION --query 'taskDefinition.family' --output text)
          aws ecs describe-task-definition --task-definition $TASK_DEF_ARN --region $REGION --query 'taskDefinition' > task-def.json
          # Remove fields that register-task-definition does not accept
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' task-def.json > task-def-clean.json
          # Point container to the image we just pushed (unique tag = no cache)
          jq --arg img "$NEW_IMAGE" '.containerDefinitions[0].image = $img' task-def-clean.json > task-def-final.json
          aws ecs register-task-definition --cli-input-json file://task-def-final.json --region $REGION
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --task-definition $TASK_FAMILY --force-new-deployment --region $REGION
